<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade BitDogLab</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="lib/xterm/xterm.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-brand">
                <span class="logo">Comunidade BitDogLab</span>
            </div>

            <!-- Navegação -->
            <nav class="header-nav">
                <button class="nav-btn active" data-section="homeSection">
                    <span class="material-icons">home</span> Home
                </button>
                <button class="nav-btn" data-section="terminalSection">
                    <span class="material-icons">terminal</span> Terminal
                </button>
            </nav>

            <div class="header-controls">
                <!-- Login Google -->
                <button id="loginBtn" class="btn btn-login" onclick="loginWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="google-icon">
                    Entrar com Google
                </button>

                <!-- Info do usuário logado -->
                <div id="userInfo" class="user-info" style="display: none;">
                    <img id="userAvatar" class="user-avatar" alt="Avatar">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="btn btn-small" onclick="logout()">Sair</button>
                </div>

                <!-- Controles serial (visíveis apenas na aba terminal) -->
                <div id="serialControls" class="serial-controls" style="display: none;">
                    <button id="connectBtn" class="btn btn-connect">Conectar</button>
                    <button id="disconnectBtn" class="btn btn-disconnect" disabled>Desconectar</button>
                    <div class="status-indicator">
                        <span id="statusDot" class="status-dot disconnected"></span>
                        <span id="statusText" class="status-text">Desconectado</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- HOME - Grid de Projetos [CLAUDE] -->
            <section class="home-section active" id="homeSection">
                <div class="home-container">
                    <div class="home-header">
                        <h2 class="home-title">Projetos da Comunidade</h2>
                        <button id="addProjectBtn" class="btn btn-add" style="display: none;" onclick="openProjectModal()">
                            <span class="material-icons">add</span> Novo Projeto
                        </button>
                    </div>
                    <div id="projectsGrid" class="projects-grid">
                        <p class="empty-message">Nenhum projeto ainda. Seja o primeiro a publicar!</p>
                    </div>
                </div>
            </section>

            <!-- TERMINAL - WebSerial [KIMI] -->
            <section class="terminal-section" id="terminalSection">
                <div class="terminal-container">
                    <div class="terminal-toolbar">
                        <span class="terminal-title">Terminal</span>
                        <div class="terminal-controls">
                            <select id="baudRate" class="select select-small">
                                <option value="9600">9600</option>
                                <option value="19200">19200</option>
                                <option value="38400">38400</option>
                                <option value="57600">57600</option>
                                <option value="115200" selected>115200</option>
                            </select>
                            <button id="resetBtn" class="btn btn-small" disabled>Reset</button>
                            <button id="stopBtn" class="btn btn-small" disabled>Parar</button>
                            <button id="clearBtn" class="btn btn-small">Limpar</button>
                        </div>
                    </div>
                    <div id="terminal" class="terminal"></div>
                    <div class="terminal-input-area">
                        <input 
                            type="text" 
                            id="commandInput" 
                            class="terminal-input" 
                            placeholder="Digite um comando..." 
                            disabled
                        >
                        <button id="sendBtn" class="btn btn-send" disabled>Enviar</button>
                        <button id="ctrlCBtn" class="btn btn-ctrl" disabled>Ctrl+C</button>
                        <button id="ctrlDBtn" class="btn btn-ctrl" disabled>Ctrl+D</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal de Novo Projeto [CLAUDE] -->
    <div id="projectModal" class="modal-overlay">
        <div class="modal modal-large">
            <div class="modal-header">
                <h2 class="modal-title">Novo Projeto</h2>
                <button class="modal-close" onclick="closeProjectModal()">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <p class="modal-subtitle">Preencha todos os campos para publicar seu projeto.</p>
            <div class="modal-form">
                <label class="form-label" for="projectTitle">Nome do Projeto *</label>
                <input type="text" id="projectTitle" class="form-input" placeholder="Ex: Semáforo com LEDs RGB" maxlength="100">

                <label class="form-label" for="projectDescription">Descrição *</label>
                <textarea id="projectDescription" class="form-textarea" placeholder="Explique o que seu projeto faz, como funciona..." rows="4"></textarea>

                <label class="form-label" for="projectVideo">Link do Vídeo (YouTube ou Google Drive) *</label>
                <input type="url" id="projectVideo" class="form-input" placeholder="https://youtube.com/watch?v=...">

                <label class="form-label">Main.py - Script principal *</label>
                <input type="file" id="projectMainFile" class="form-file" accept=".py">

                <label class="form-label">Bibliotecas (.py)</label>
                <input type="file" id="projectLibraries" class="form-file" accept=".py" multiple>

                <label class="form-label">PDFs de documentação *</label>
                <input type="file" id="projectPdfs" class="form-file" accept=".pdf" multiple>

                <label class="form-label">Documentos extras</label>
                <input type="file" id="projectExtras" class="form-file" multiple>

                <div id="uploadProgress" class="upload-progress" style="display: none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <span id="progressText" class="progress-text">Enviando...</span>
                </div>

                <button id="publishBtn" class="btn btn-save" onclick="publishProject()">
                    <span class="material-icons">publish</span> Publicar Projeto
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Cadastro de Perfil [CLAUDE] -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal">
            <h2 class="modal-title">Bem-vindo à Comunidade!</h2>
            <p class="modal-subtitle">Complete seu perfil para começar a contribuir.</p>
            <div class="modal-form">
                <label class="form-label" for="profileName">Nome</label>
                <input type="text" id="profileName" class="form-input" placeholder="Seu nome completo" maxlength="100">

                <label class="form-label" for="profileBio">Bio</label>
                <textarea id="profileBio" class="form-textarea" placeholder="Conte um pouco sobre você..." maxlength="200" rows="3"></textarea>

                <button class="btn btn-save" onclick="saveProfile()">Salvar Perfil</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <!-- Plataforma [CLAUDE] -->
    <script src="js/projects.js"></script>
    <script src="js/home.js"></script>
    <script src="js/navigation.js"></script>

    <!-- WebSerial [KIMI] -->
    <script src="lib/xterm/xterm.js"></script>
    <script src="js/webserial.js"></script>
    <script src="js/flash.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
